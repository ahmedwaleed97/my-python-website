{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<style>
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0d0d0d;color:#e0e0e0}
.login-card{background:#111;border:1px solid #1e1e1e;padding:28px;border-radius:12px;width:360px}
.login-card h1{margin-bottom:12px;font-size:1.25rem;color:#fff}
.login-card label{display:block;margin-top:8px;margin-bottom:6px;color:#bbb;font-size:.9rem}
.login-card input[type="password"]{width:100%;padding:10px;border-radius:8px;border:1px solid #252525;background:#181818;color:#e0e0e0}
.btn{margin-top:12px;width:100%;padding:10px;border-radius:8px;background:#fff;color:#000;border:none;font-weight:700}
.flash{background:#0f2e1a;border:1px solid #1a5c30;color:#4caf81;padding:8px;border-radius:8px;margin-bottom:12px}
</style>

<div class="login-wrap">
  <div class="login-card">
    <h1>Admin Login</h1>
    {% with msgs = get_flashed_messages() %}
      {% if msgs %}<div class="flash">{{ msgs[0] }}</div>{% endif %}
    {% endwith %}
    <form method="POST" action="/login">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" autofocus required>
      <button class="btn" type="submit">Sign in</button>
    </form>
  </div>
</div>

{% endblock %}
